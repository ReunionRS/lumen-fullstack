name: project
description: "Lumen Group — Дом под контролем"
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  http_parser: ^4.0.2
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  flutter_web_auth_2: ^4.1.0
  multicast_dns: ^0.3.2+7
  file_picker: ^8.0.5
  url_launcher: ^6.3.1
  flutter_local_notifications: ^17.2.3
  package_info_plus: ^8.0.2
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0
  firebase_core: ^2.27.1
  firebase_messaging: ^14.7.21
  upgrader: 10.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/house-1.jpg
    - assets/house-2.jpg
    - assets/images/home_assistant_connection_light.png
    - assets/images/home_assistant_connection_dark.png
